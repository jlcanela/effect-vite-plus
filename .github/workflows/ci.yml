name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "25"
          cache: true

      - run: vp install
      - run: vp check
      - run: vp test
      - run: vp run website#pack
#      - run: vp build
